<!DOCTYPE html> 
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System</title>
<link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="login-container">
    <!-- div principal de login class login-container usada no CSS -->

    <h1> Login</h1>
        <!-- tipo principal da pagina -->
    <p>Acesse sua conta</p>
    <!-- testo auxiliar de instrução para o usuário -->
    <Form>
        <div class="imput-group">     
            <label for="email">Email</label> <!-- testo que descreve nosso campo -->
            <input id="email" type="email" placeholder="Digite seu email"> <!-- campo de entreda do e-mail -->
           
            <label for="senha">Senha</label> <!-- testo que descreve nosso campo de senha-->
            <input id="senha" type="password" placeholder="Digite sua senha"> <!-- campo de entreda para a senha -->
            <button type="submit">Entrar</button>
        
        
        <div class="<"footer">
        <span>Não tem conta</span>
        <a href="#">Criar conta</a>  <!-- campo de Criar conta -->
    
</body>
</html>
